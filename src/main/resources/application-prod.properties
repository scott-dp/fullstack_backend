# Production profile using MySQL, secure cookies, and reverse-proxy aware settings.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://db:3306/myapp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

app.frontend-url=${APP_FRONTEND_URL:https://localhost}
app.security.cookie-name=${APP_COOKIE_NAME:auth-token}
app.security.cookie-secure=${APP_COOKIE_SECURE:true}
server.forward-headers-strategy=framework

app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:krisefikser4@gmail.com}

security.jwt.secret-key=${JWT_SECRET}
security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:krisefikser4@gmail.com}
spring.mail.password=${KRISEFIKSER_EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

app.upload-dir=${UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

logging.file.path=${LOG_PATH:/app/logs}
logging.level.stud.ntnu.no.fullstack_project=INFO
logging.level.org.springframework.security=WARN
