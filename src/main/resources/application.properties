spring.application.name=fullstack-project
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.security.cookie-name=${APP_COOKIE_NAME:auth-token}
app.security.cookie-secure=${APP_COOKIE_SECURE:false}

security.jwt.secret-key=${JWT_SECRET:change-this-secret-key-to-at-least-32-characters}
security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
