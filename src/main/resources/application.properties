# Shared application defaults that apply to all profiles unless overridden locally.
spring.application.name=fullstack-project
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.security.cookie-name=${APP_COOKIE_NAME:auth-token}
app.security.cookie-secure=${APP_COOKIE_SECURE:false}
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:krisefikser4@gmail.com}

security.jwt.secret-key=${JWT_SECRET:change-this-secret-key-to-at-least-32-characters}
security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:krisefikser4@gmail.com}
spring.mail.password=${KRISEFIKSER_EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

app.upload-dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
logging.file.path=${LOG_PATH:logs}
